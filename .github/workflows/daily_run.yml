name: Daily Ohaasa Webhook

on:
  schedule:
    # cron 설정: 분 시 일 월 요일 (UTC 기준)
    # 아침 7시에 실행하려면 22:00 UTC로 설정.
    - cron: '0 22 * * *'
  workflow_dispatch: # 직접 버튼을 눌러서 실행해볼 수 있게 합니다.

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4

    - name: Run script
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: python ohaasa_webhook.py
