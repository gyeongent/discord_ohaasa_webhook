name: Daily Ohaasa Webhook

on:
  schedule:
    - cron: '30 21 * * *' # 한국 시간 오전 6시 30분
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # v3에서 업그레이드

    - name: Set up Python
      uses: actions/setup-python@v5 # v4에서 업그레이드
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4

    - name: Run script
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: python ohaasa_webhook.py
